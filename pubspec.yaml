name: finova_expense
description: Finova Expense offline-first personal finance app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.28.1
  drift_flutter: ^0.2.5
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.1
  fl_chart: ^0.71.0
  intl: ^0.20.2
  uuid: ^4.5.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^19.4.2
  share_plus: ^12.0.1
  file_picker: ^10.3.2
  dynamic_color: ^1.8.1
  google_fonts: ^6.3.1
  animations: ^2.0.11
  collection: ^1.19.1
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.6.0
  drift_dev: ^2.28.2
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
